<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Velixaco | Secured Acquisition</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    .heading { font-family: 'Montserrat', sans-serif; letter-spacing: 0.15em; text-transform: uppercase; }
    .sans { font-family: 'Inter', sans-serif; }
    body { background-color: #FFFFFF; color: #000000; scroll-behavior: smooth; }
    
    .input-flow {
        border-bottom: 1.5px solid #E5E7EB;
        transition: all 0.4s ease;
    }
    .input-flow:focus-within {
        border-bottom-color: #0B3D2E;
    }
    
    .reveal { opacity: 0; transform: translateY(15px); transition: all 1s cubic-bezier(0.16, 1, 0.3, 1); }
    .reveal.active { opacity: 1; transform: translateY(0); }
    ::selection { background-color: #0B3D2E; color: white; }
    
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: #0B3D2E; border-radius: 10px; }
  </style>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            deepGreen: '#0B3D2E',
            softGrey: '#FBFBFB',
            borderGrey: '#F2F2F2'
          }
        }
      }
    }
  </script>
</head>
<body class="sans selection:bg-deepGreen selection:text-white overflow-x-hidden">

  <!-- NAVIGATION -->
  <nav class="w-full px-16 py-12 flex items-center justify-between absolute top-0 left-0 z-50">
    <a href="index.html" class="heading text-xl font-black tracking-[0.2em]">VELIXACO</a>
    <div class="flex items-center gap-12">
        <a href="cart.html" class="heading text-[10px] font-bold hover:text-deepGreen transition-colors">Go Back</a>
        <div class="flex items-center gap-2">
            <i data-lucide="shield-check" class="w-4 h-4 text-deepGreen"></i>
            <span class="heading text-[9px] font-bold text-deepGreen">Secured Protocol</span>
        </div>
    </div>
  </nav>

  <main class="min-h-screen pt-52 pb-32">
    <div class="max-w-7xl mx-auto px-16">
      <div class="flex flex-col lg:flex-row items-start gap-32">
        
        <!-- LEFT: FORM SECTION -->
        <div class="lg:w-[55%] flex flex-col gap-24 reveal">
          
          <!-- Curator Information -->
          <div class="flex flex-col gap-12">
            <div class="flex items-center gap-4">
                <h2 class="heading text-[11px] font-black text-deepGreen">01 / Curator Information</h2>
                <div class="h-[1px] flex-1 bg-borderGrey"></div>
            </div>
            
            <div class="grid grid-cols-2 gap-x-12 gap-y-16">
              <div class="flex flex-col gap-4 input-flow pb-2">
                <label class="heading text-[9px] font-black text-black">First Name</label>
                <input type="text" placeholder="JEAN" class="bg-transparent outline-none font-black text-sm tracking-widest placeholder:text-black/40 uppercase text-black">
              </div>
              <div class="flex flex-col gap-4 input-flow pb-2">
                <label class="heading text-[9px] font-black text-black">Last Name</label>
                <input type="text" placeholder="CLAUDE" class="bg-transparent outline-none font-black text-sm tracking-widest placeholder:text-black/40 uppercase text-black">
              </div>
              <div class="col-span-2 flex flex-col gap-4 input-flow pb-2">
                <label class="heading text-[9px] font-black text-black">Email Address</label>
                <input type="email" placeholder="CONCIERGE@VELIXACO.IN" class="bg-transparent outline-none font-black text-sm tracking-widest placeholder:text-black/40 uppercase text-black">
              </div>
            </div>
          </div>

          <!-- White-Glove Transit -->
          <div class="flex flex-col gap-12">
            <div class="flex items-center gap-4">
                <h2 class="heading text-[11px] font-black text-deepGreen">02 / White-Glove Transit</h2>
                <div class="h-[1px] flex-1 bg-borderGrey"></div>
            </div>
            
            <div class="grid grid-cols-2 gap-x-12 gap-y-16">
              <div class="col-span-2 flex flex-col gap-4 input-flow pb-2">
                <label class="heading text-[9px] font-black text-black">Street Address</label>
                <input type="text" placeholder="123 HOROLOGY LANE" class="bg-transparent outline-none font-black text-sm tracking-widest placeholder:text-black/40 uppercase text-black">
              </div>
              <div class="flex flex-col gap-4 input-flow pb-2">
                <label class="heading text-[9px] font-black text-black">City</label>
                <input type="text" placeholder="GENEVA" class="bg-transparent outline-none font-black text-sm tracking-widest placeholder:text-black/40 uppercase text-black">
              </div>
              <div class="flex flex-col gap-4 input-flow pb-2">
                <label class="heading text-[9px] font-black text-black">Postal Code</label>
                <input type="text" placeholder="1211" class="bg-transparent outline-none font-black text-sm tracking-widest placeholder:text-black/40 uppercase text-black">
              </div>
            </div>
          </div>

          <div class="flex items-center gap-10 opacity-70">
            <div class="flex items-center gap-3">
                <i data-lucide="lock" class="w-3.5 h-3.5 text-black"></i>
                <span class="heading text-[8px] font-black text-black">Encrypted Checkout</span>
            </div>
          </div>

        </div>

        <!-- RIGHT: SUMMARY CARD -->
        <div class="lg:w-[45%] w-full reveal" style="transition-delay: 200ms;">
          <div class="bg-white rounded-[2px] p-16 shadow-[0_80px_160px_-40px_rgba(0,0,0,0.06)] border border-borderGrey sticky top-40">
            <h3 class="heading text-[10px] font-black text-black/40 mb-16 tracking-[0.3em]">Acquisition Summary</h3>
            
            <div id="checkout-items" class="flex flex-col gap-12 pb-12 border-b border-borderGrey max-h-[300px] overflow-y-auto custom-scroll pr-4">
                <!-- Dynamic Items -->
            </div>

            <div class="flex flex-col gap-6 py-12">
                <div class="flex justify-between items-center px-2">
                    <span class="heading text-[9px] font-bold text-black/40">Sub-Portfolio</span>
                    <span id="sub-total" class="sans text-sm font-bold tracking-tight">₹0</span>
                </div>
                <div class="flex justify-between items-center px-2">
                    <span class="heading text-[9px] font-bold text-black/40">Transit</span>
                    <span class="heading text-[8px] font-black text-deepGreen bg-deepGreen/5 px-4 py-2 rounded-full">Complimentary</span>
                </div>
                
                <div class="mt-12 pt-12 border-t border-borderGrey flex justify-between items-end px-2">
                    <div class="flex flex-col gap-2">
                        <span class="heading text-[10px] font-black text-black">Total Valuation</span>
                    </div>
                    <span id="total-value" class="sans text-4xl font-black tracking-tighter">₹0</span>
                </div>
            </div>

            <button onclick="processPayment()" class="w-full bg-deepGreen text-white py-8 rounded-full heading text-[11px] font-black shadow-[0_32px_64px_-16px_rgba(11,61,46,0.3)] hover:bg-[#124A3B] transition-all active:scale-[0.98] mt-8 flex items-center justify-center gap-4 group">
                Purchase Asset
                <i data-lucide="chevron-right" class="w-4 h-4 group-hover:translate-x-1 transition-transform opacity-30"></i>
            </button>
            
            <p class="text-center heading text-[8px] font-bold text-black/20 mt-12 leading-relaxed">
                Global Concierge Oversight Active.
            </p>
          </div>
        </div>

      </div>
    </div>
  </main>

  <!-- PAYMENT OVERLAY -->
  <div id="payment-overlay" class="fixed inset-0 z-[200] flex items-center justify-center opacity-0 invisible transition-all duration-1000">
    <div class="absolute inset-0 bg-white/98 backdrop-blur-3xl"></div>
    <div class="relative w-full max-w-lg text-center flex flex-col items-center gap-12">
        <div id="payment-spinner" class="w-20 h-20 rounded-full border-[1px] border-deepGreen/5 border-t-deepGreen animate-spin"></div>
        
        <div id="payment-success" class="hidden flex flex-col items-center gap-10">
            <div class="w-24 h-24 bg-deepGreen rounded-full flex items-center justify-center">
                <i data-lucide="check" class="w-12 h-12 text-white stroke-[4px]"></i>
            </div>
            <h2 class="heading text-3xl font-black">Confirmed.</h2>
        </div>

        <div class="flex flex-col gap-6">
            <h2 id="payment-status" class="heading text-[10px] font-black text-black">Securing Escrow Channel</h2>
            <p id="payment-details" class="heading text-[8px] font-bold text-black/20">Verifying Portfolio Integrity...</p>
        </div>

        <div class="flex flex-col gap-10 mt-8">
            <button id="payment-back" onclick="closePayment()" class="heading text-[9px] font-black text-black/40 hover:text-black border-b border-black/10 hover:border-black transition-all">
                Stay in Checkout
            </button>
            <button id="payment-cart" onclick="window.location.href='cart.html'" class="heading text-[9px] font-black text-deepGreen hover:text-black border-b border-deepGreen/10 hover:border-black transition-all">
                Return to Portfolio
            </button>
        </div>
    </div>
  </div>

  <script>
    lucide.createIcons();

    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => entry.isIntersecting && entry.target.classList.add('active'));
    }, { threshold: 0.1 });
    document.querySelectorAll('.reveal').forEach(el => observer.observe(el));

    function renderCheckout() {
        const cart = JSON.parse(localStorage.getItem('velixaco-cart')) || [];
        const container = document.getElementById('checkout-items');
        const subTotalTag = document.getElementById('sub-total');
        const totalValueTag = document.getElementById('total-value');
        
        if (!container) return;
        if (cart.length === 0) { window.location.href = 'cart.html'; return; }

        let total = 0;
        container.innerHTML = cart.map(item => {
            const priceNum = parseFloat((item.price || "0").replace(/[^\d.]/g, '')) || 0;
            total += priceNum * item.qty;
            return `
                <div class="flex gap-10 items-center px-2">
                    <div class="w-24 h-24 bg-softGrey p-4 flex-shrink-0">
                        <img src="${item.img || 'watch.png'}" class="w-full h-full object-contain mix-blend-multiply" alt="${item.name}">
                    </div>
                    <div class="flex flex-col gap-2">
                        <h4 class="heading text-[12px] font-black text-black">${item.name || 'Masterpiece Asset'}</h4>
                        <p class="heading text-[8px] font-bold text-black/30">Quantity: ${item.qty} • ${item.price}</p>
                    </div>
                </div>
            `;
        }).join('');

        const formattedTotal = '₹' + total.toLocaleString('en-IN', { maximumFractionDigits: 0 });
        subTotalTag.innerText = formattedTotal;
        totalValueTag.innerText = formattedTotal;
    }

    function processPayment() {
        const overlay = document.getElementById('payment-overlay');
        const spinner = document.getElementById('payment-spinner');
        const success = document.getElementById('payment-success');
        const status = document.getElementById('payment-status');
        const details = document.getElementById('payment-details');
        const backBtn = document.getElementById('payment-back');
        const cartBtn = document.getElementById('payment-cart');

        overlay.classList.remove('invisible', 'opacity-0');
        backBtn.classList.remove('hidden');
        cartBtn.classList.remove('hidden');
        
        // Clear any existing timeouts to prevent multiple triggers if opened/closed fast
        window.paymentTimeline = [];

        window.paymentTimeline.push(setTimeout(() => {
            status.innerText = "Authenticating Portfolio";
            details.innerText = "Vault Reference VX-7721...";
        }, 1500));

        window.paymentTimeline.push(setTimeout(() => {
            spinner.classList.add('hidden');
            success.classList.remove('hidden');
            backBtn.classList.add('hidden'); // Hide buttons on success
            cartBtn.classList.add('hidden'); 
            status.innerText = "";
            details.innerText = "Finalizing Acquisition Certificates...";
            
            localStorage.removeItem('velixaco-cart');

            setTimeout(() => {
                window.location.href = 'orders.html';
            }, 3000);
        }, 4500));
    }

    function closePayment() {
        const overlay = document.getElementById('payment-overlay');
        const spinner = document.getElementById('payment-spinner');
        const success = document.getElementById('payment-success');
        const status = document.getElementById('payment-status');
        const details = document.getElementById('payment-details');

        overlay.classList.add('invisible', 'opacity-0');
        
        // Reset states
        spinner.classList.remove('hidden');
        success.classList.add('hidden');
        status.innerText = "Securing Escrow Channel";
        details.innerText = "Verifying Portfolio Integrity...";
        
        // Kill timeline
        if(window.paymentTimeline) {
            window.paymentTimeline.forEach(t => clearTimeout(t));
        }
    }

    renderCheckout();
  </script>
</body>
</html>
